body:
  text: 所執與依他復有圓成實是三自性深智者所應知一顯者為依他如顯乃所執依藉緣轉故唯造執有故二此顯者之如顯一切時無有應知圓成實自性不變故三此顯執非有云何顯二性無所有所由是無二法性四執非有者心由此有所執如是執有義境如是決無有五即以因果性說心為二種名阿賴耶識名轉識七種六以煩惱習氣種子聚名心初心次則以種種相轉故七略說執非有有三種應知依異熟依因餘一為照似八初為根本識異熟性應知餘者為轉識見所見知轉故九有非有二一煩惱清淨故及相無別故說自性深密十以執為有故及決定無有是所執自性故說有非有十一以亂性故有如所顯則無由此為依他故說有非有十二以無二故有及此二都無圓成實自性故說有非有十三所執義境二性非有一性故愚所執自性說為二一性十四由顯二性故唯亂一性故名依他自性說為二一性十五二無自性故無二一性故圓成實自性說為二一性十六所執及依他煩惱相應知惟說圓成實是乃清淨相十七非有二性故及彼無性故離所執自性圓成無別相十八無二自性故二無自性故離圓成所執應知無別相十九如顯非有故非有自性故離依他自性圓成無別相二十非有二性故如顯非自性離圓成依他應知無別相二十一自性次第分為依世俗故亦為入彼故為廣知故作二十二所執世俗性次世俗者性斷世俗自性餘一所應知二十三二無以為性初依他得入由是得入於唯執非有二二十四由是二無性圓成乃得入如是彼此時可說有非有二十五自性雖有三無二無依相無故非如故彼無自性故二十六如以咒願力幻造象性現此中唯行相象則決無有二十七象是所執性行相乃依他此中無象者乃謂圓成實二十八執非有顯現以二性由本心故二則決無有所有唯行相二十九根本識如咒真如說如木分別如象相二則應如象三十為通達義境實一時於三相若知斷及得應如其次第三十一知乃無所得斷謂不顯現所得因即得此即親證用三十二以二無所得二行相遂去既去圓成實二無遂得證三十三於象無所得彼行相亦去有所得於木如幻中一時三十四由滅慧障故以覺見妄故三智隨轉故自然得解脫三十五由得唯心故所知義境無得所知義境無得故應心無得三十六於二無得故乃得於法界以得法界故乃得於徧能三十七既得於徧能自他利成就故智者得無上菩提三身性三十八軌範師世親造譯文完譯者附記金克木世親菩薩說深密三性教我今敬譯此功德利有情世親菩薩的三自性論梵文原本在尼泊爾發現後曾由日本山口益校刊於宗教研究一九三一又由比利時布善校刊於漢學與佛學叢刊第二卷一九三三又由印度蘇季子穆克基校刊一九三九年單行本漢譯缺藏譯有二本一標世親菩薩造一標龍樹菩薩造其中一本多出二頌今參照二本模仿舊譯體譯出如右加圓括弧字是異譯加方括弧字是因五言不足而增字圈點表示斷句譯文粗陋更恐多誤呈獻方家之前意在拋磚引玉至於內容方面譯者薄學寡聞質鈍根淺不敢妄加議論待將來更有所得自當提出請方家指教現在衹略抒淺識附於下面三自性的理論是唯識宗學說的重要部份因此藏譯之一指為龍樹所造顯然錯誤很明顯的是在小乘有宗實在論者經大乘空宗虛無論者否定論者駁倒之後由大乘有宗極端唯心論者建立出來的新理論這是承認空的教條而加以新釋因而把它容納在新理論系統之內由此把以前的一正一反向前發展結成更龐大的扶持原來正統的新理論體系按照歐陽竟無先生說更分法相與唯識二派攝大乘論唯識三十頌建立中心理論辯中邊論以有說空解決空的問題五蘊集論百法列舉名相組成新系統解說瑜伽師地論便是綜合的大百科全書現觀莊嚴論辨法法性論等也都是這一彌勒學系統中的解決重要迫切理論問題的大著卻衹在西藏流通原來沒有漢譯現在唯識中邊現觀集論尤其是瑜伽本地分的梵本都已發現集論中邊瑜伽在西藏發現除集論外還未校刊追溯一切有與經量的世親的俱舍論頌連長行也有了原本在西藏發現現未校刊將來梵文原典陸續出現參照漢譯藏譯我們是有希望得到更多材料來弄清楚佛教思想的發展的歷史的唯識這一大學派的內部也有理論發展與分化的歷史世親本人的思想演變就是具體例證從這一點來看三自性論有重要意義無論它是世親本人或世親一派的人或其他的佛教中人所造它所提出的理論是比唯識三十頌末尾更進一步正面肯定了這一理論系統中的宇宙的最後的真實性尤其是象的比喻中明白提出了真如說如木這樣對究竟真實的正面肯定是佛教思想尤其是空宗所避免的除了經中的譬喻描寫以外這樣正面提出了真如就使佛教思想給後來發揮梵我合一的婆羅門思想家商羯羅準備了基礎給佛教理論的為吠檀多宗襲取佈置了進一步的條件這就牽涉到印度思想中婆羅門傳統與佛教傳統的交互關係問題每一派思想的發生在古印度總是採取宗教的形式流行這也就表明了它必然是為社會上的一部分人所擁護而這些人也就形成了所謂教派因此每一派思想一套理論除了思想本身的發展軌跡以外追根究底是與社會上的某一些人的需要息息相關的沙門對婆羅門的抗議不僅是理論的而且主要是行動的他們在反祭祀倡戒殺這一點上明顯地指出當時社會上所爭執的主要是對牛的態度問題追進一步這就是把牛看做祭天犧牲還是與人平等的生物的問題揭穿了說這就是把牛當做食糧看的遊牧社會的人所具有的生活態度和把牛當做生產工具看的農業社會的人所具有的生活態度之間的衝突的問題也就是社會上新與舊的生活方法態度思想的衝突的問題從此便發生了一連串對婆羅門的制度與思想的反對理論其中把自己建立得最完全最澈底因而得到多數人擁護最後又得到統一天下的統治者的支持的這無疑的是統治者為了掌握人心發展生產擴充財富加強自己的剝削統治地位而來利用它就是佛教龐大的理論系統複雜瑣碎的理論爭執凡成為紛爭的為一些人所接受而另一些人所反對的都有當時的社會需要的背景而且是圍繞着根本問題來進行的佛教也正是如此佛教內部的上座大眾的分化由此演變出大乘小乘的對立若沒有社會上的支持也是不會發展起來的不過最後遺留在文獻中的就很少實際意義而變成純粹理論的爭論了就純粹理論來說佛教對思想方法的貢獻在今天看來也是有其重大的歷史意義的緣生的因果關係理論在當時是反對因中有果與因中無果而別創一套但結果是成立了對宇宙事物的函數關係的看法它雖然有導引到詭辯的傾向但仍是比其他的機械的因果理論更進一步接近了客觀事物的規律由於這一點佛教提倡了分析和推理它雖然最後陷入了繁瑣但是它的思想方法顯然比較奧義書的神秘主義大大推進了一步至於由戒殺而提出的生物平等理論最初是反統治者分化隔絕的思想武器後來卻隨佛教本身的演變而被統治者利用去作迷惑反抗思想的工具實際上這也比較婆羅門的反映氏族社會的把分工和血統定為天生的高下階級差別的種姓制度是進了一步的不過佛教整個的理論是把宇宙翻轉來看的把變化當作虛妄不變的當作真實因此對變化雖然有了很進步的看法加上了很有意義的對矛盾變化的分析但結果卻把矛盾變化判為虛妄它建立了無常論為的是把無常否定以反對婆羅門的常我起卻以建立另外一種常我終看出一切的變化發展不能停留看出變化由於矛盾看出現實不合概念與形式推理這是對客觀辯證規律的進步的認識但否定了這樣的真實追求不變的概念的神祕的真實就使佛教思想仍建築在唯心論上這是它的宗教性質和時代條件社會背景所決定了的以上是譯者的幼稚的不成熟的一種初步看法由譯三自性論附帶在這裏提出希望將來能作更多的研究一併請方家指教周叔弢先生今年六十壽辰我就把這一篇拙劣的譯文當做我的菲薄的禮物一九四八年三月譯一九五零年七月記
