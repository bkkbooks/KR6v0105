body:
  text: 三自性論作者印度世親譯者金克木題解三自性論印度佛教瑜伽行派典籍一卷世親菩薩著金克木譯根據金克木先生的譯者附記本文獻的梵文本原藏尼泊爾年由日本山口益校刊於宗教研究年又由比利時布善校刊於漢學與佛學叢刊第二卷年印度蘇季子穆克基校刊出版單行本本文獻原無漢譯年金克木先生參照二本模仿舊譯體譯出加圓括弧字是異譯加方括弧字是因五言不足而增字圈點表示斷西藏譯有二本一標世親菩薩造一標龍樹菩薩造其中一本多出二頌因為本文獻論述的是印度佛教瑜伽行派的思想故所謂龍樹菩薩造顯然為誤傳關於本典籍的思想價值請參見譯文後所附譯者附記標點依據譯者原文移錄本譯文及譯者附記最早發表在周叔弢先生六十生日紀念論文集中今徵得金木嬰女士同意重新刊登在藏外佛教文獻以示對金克木先生的紀念在此特向金木嬰女士表示謝意方廣錩譯文
